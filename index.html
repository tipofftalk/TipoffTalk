<!DOCTYPE html>
<html>
<head>
  <title>TipoffTalk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: #0a0a0a;
      color: white;
    }
    .header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }
    .card {
      margin: 16px;
      padding: 16px;
      background: #111;
      border-radius: 12px;
    }
    .score {
      font-size: 20px;
      margin-top: 10px;
    }
    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #111;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
    }
  </style>
</head>

<body>

<div class="header">TipoffTalk 🏀</div>

<div class="card">
  <div>LIVE GAME</div>
  <div class="score">Lakers 102 - 99 Warriors</div>
</div>

<div class="card">
  <div>🔥 RUMOR</div>
  <div>League execs believe a major trade is coming before deadline</div>
</div>

<div class="card">
  <div>🧠 BLOG</div>
  <div>The NBA lost its edge. Here’s why.</div>
</div>

<div class="nav">
  <div>Home</div>
  <div>Scores</div>
  <div>Feed</div>
  <div>Profile</div>
</div>

</body>
</html>
