<!DOCTYPE html>
<html>
<head>
  <title>TipoffTalk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family:-apple-system; background:#0a0a0a; color:white; }
    .nav { position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:#111; padding:12px; }
    .tab { display:none; padding:20px; }
    .active { display:block; }
    .card { background:#111; padding:16px; border-radius:12px; margin-bottom:12px; }
  </style>
</head>

<body>

<div id="home" class="tab active">
  <h2>TipoffTalk 🏀</h2>
  <div class="card">Welcome to the everything basketball app.</div>
</div>

<div id="scores" class="tab">
  <h2>Scores</h2>
  <div class="card">Lakers 102 - 99 Warriors</div>
</div>

<div id="feed" class="tab">
  <h2>Feed</h2>
  <div class="card">Shai’s MVP case is undeniable.</div>
</div>

<div id="podcast" class="tab">
  <h2>Podcast</h2>
  <div class="card">Exclusive TipoffTalk episode.</div>
</div>

<div id="players" class="tab">
  <h2>Savant</h2>
  <div class="card">Player ratings coming soon.</div>
</div>

<div class="nav">
  <button onclick="show('home')">Home</button>
  <button onclick="show('scores')">Scores</button>
  <button onclick="show('feed')">Feed</button>
  <button onclick="show('podcast')">Podcast</button>
  <button onclick="show('players')">Savant</button>
</div>

<script>
function show(tab){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
}
</script>

</body>
</html>
